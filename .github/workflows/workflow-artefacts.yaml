name: Test and Artifacts Generation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PHP with Xdebug
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, sqlite3, pdo_sqlite
        coverage: xdebug

    - name: Install Composer Dependencies
      run: composer install --prefer-dist --no-progress --no-suggest

    - name: Run PHPUnit Tests & Generate Code Coverage
      run: |
        mkdir -p output/coverage
        ./vendor/bin/phpunit --coverage-html output/coverage

    - name: Build and Run Algorithms via Docker Compose
      run: |
        # Levanta o container, executa os scripts de métricas/gráficos e encerra
        docker compose up --build --exit-code-from app-algorithms
        # Nota: Ajuste 'app-algorithms' para o nome exato do seu serviço Python no docker-compose.yaml se for diferente
      env:
        CI: true

    - name: Fix Permissions for Upload
      if: always()
      run: sudo chown -R $USER:$USER output/

    - name: Upload Execution Artifacts (Metrics & Graphs)
      uses: actions/artifacts/upload-artifact@v4
      if: always() 
      with:
        name: execution-metrics-and-graphs
        path: |
          output/metrics.csv
          output/metrics.json
          output/*.png
        retention-days: 14

    - name: Upload PHPUnit Code Coverage Report
      uses: actions/artifacts/upload-artifact@v4
      if: success() 
      with:
        name: phpunit-code-coverage
        path: output/coverage/
        retention-days: 14