name: Continuous Integration and Artifacts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: binary_library
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, json, libxml, mbstring, pdo, pdo_mysql, sqlite3, pdo_sqlite
          coverage: xdebug

      - name: Validate composer
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Optimize Autoload
        run: composer dump-autoload

      - name: Run PHPUnit & Generate Coverage Report
        run: |
          mkdir -p output/coverage
          ./vendor/bin/phpunit --coverage-html output/coverage
        env:
          DB_HOST: mysql
          DB_USER: root
          DB_PASS: root
          DB_NAME: binary_library

      - name: Run Algorithm Metrics & Graphs via Docker
        run: |
          docker compose up --build --exit-code-from algoritmo-metrics

      - name: Fix Permissions for Upload
        if: always()
        run: sudo chown -R $USER:$USER output/

      - name: Upload Execution Metrics and Graphs (Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: execution-metrics-and-graphs
          path: |
            output/metrics.csv
            output/metrics.json
            output/*_graph_*.png
          retention-days: 14

      - name: Upload PHPUnit Code Coverage (Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phpunit-code-coverage-report
          path: output/coverage/
          retention-days: 14